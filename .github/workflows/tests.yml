name: Minimális Playwright teszt

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Python telepítése
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Csomagok telepítése
        run: pip install pytest playwright pytest-playwright

      - name: Playwright böngészők telepítése
        run: playwright install chromium

      - name: Oldal elérhetőség ellenőrzése
        run: |
          curl -v --max-time 30 https://mesz.nive.hu/ || echo "FIGYELEM: Az oldal nem érhető el!"

      - name: Tesztek futtatása
        run: pytest tests/test_minimal.py -v
