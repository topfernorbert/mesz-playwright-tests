name: Playwright tesztek - mesz.nive.hu
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Python 3.12 telepítése
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python csomagok telepítése
        run: pip install -r requirements.txt

      - name: Playwright böngészők telepítése
        run: playwright install chromium

      - name: Oldal elérhetőség ellenőrzése
        run: |
          curl -v --max-time 30 https://mesz.nive.hu/ || echo "Az oldal nem érhető el!"

      - name: Tesztek futtatása
        run: pytest tests/ -v --html=reports/report.html

      - name: Riport mentése
        uses: actions/upload-artifact@v4
        with:
          name: teszt-riport
          path: reports/report.html
